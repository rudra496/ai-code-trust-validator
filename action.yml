name: 'AI Code Trust Validator'
description: 'Validate AI-generated code for security vulnerabilities, hallucinations, and logic errors'
author: 'Rudra Sarker'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'File or directory to validate'
    required: false
    default: '.'
  min-score:
    description: 'Minimum trust score to pass (0-100)'
    required: false
    default: '70'
  strict:
    description: 'Fail on any critical issues'
    required: false
    default: 'false'
  fail-on-low:
    description: 'Fail if score is below minimum'
    required: false
    default: 'true'
  format:
    description: 'Output format (text, json, sarif)'
    required: false
    default: 'text'
  output-file:
    description: 'Output file path for report'
    required: false
    default: 'trust-report.json'
  exclude:
    description: 'Comma-separated patterns to exclude'
    required: false
    default: 'tests/*,migrations/*,vendor/*'

outputs:
  trust-score:
    description: 'Overall trust score'
    value: ${{ steps.validate.outputs.score }}
  passed:
    description: 'Whether validation passed'
    value: ${{ steps.validate.outputs.passed }}
  critical-count:
    description: 'Number of critical issues'
    value: ${{ steps.validate.outputs.critical }}
  report-file:
    description: 'Path to generated report'
    value: ${{ steps.validate.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install AI Trust Validator
      shell: bash
      run: |
        pip install -e ${{ github.action_path }} 2>/dev/null || \
          pip install ai-trust-validator 2>/dev/null || \
          pip install git+https://github.com/rudra496/ai-code-trust-validator.git
    
    - name: Run Validation
      id: validate
      shell: bash
      run: |
        set +e
        
        # Build flags
        FLAGS="--min-score ${{ inputs.min-score }}"
        if [ "${{ inputs.strict }}" = "true" ]; then
          FLAGS="$FLAGS --strict"
        fi
        
        # Run validation with JSON output for parsing
        aitrust validate ${{ inputs.path }} $FLAGS --json \
          > ${{ inputs.output-file }} 2>&1
        EXIT_CODE=$?
        
        # Also show human-readable output
        aitrust validate ${{ inputs.path }} $FLAGS || true
        
        # Extract metrics from JSON output
        if command -v python3 &>/dev/null; then
          SCORE=$(python3 -c "
        import json, sys
        try:
            data = json.load(open('${{ inputs.output-file }}'))
            if isinstance(data, list):
                scores = [r.get('trust_score', 0) for r in data]
                print(int(sum(scores)/len(scores)) if scores else 0)
            else:
                print(data.get('trust_score', 0))
        except:
            print(0)
        " 2>/dev/null || echo "0")
          CRITICAL=$(python3 -c "
        import json, sys
        try:
            data = json.load(open('${{ inputs.output-file }}'))
            items = data if isinstance(data, list) else [data]
            count = sum(len([i for i in r.get('critical_issues', []) if isinstance(i, dict)]) for r in items)
            print(count)
        except:
            print(0)
        " 2>/dev/null || echo "0")
        else
          SCORE="0"
          CRITICAL="0"
        fi
        
        # Determine pass/fail
        if [ "$SCORE" -ge "${{ inputs.min-score }}" ] && [ "$CRITICAL" -eq 0 ]; then
          PASSED="true"
        else
          PASSED="false"
        fi
        
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "report=${{ inputs.output-file }}" >> $GITHUB_OUTPUT
        
        echo ""
        echo "📊 Trust Score: $SCORE/100"
        echo "🚨 Critical Issues: $CRITICAL"
        echo "✅ Passed: $PASSED"
        
        # Fail if configured
        if [ "${{ inputs.fail-on-low }}" = "true" ] && [ "$PASSED" = "false" ]; then
          echo ""
          echo "❌ Validation failed: score $SCORE < ${{ inputs.min-score }} or $CRITICAL critical issues found"
          exit 1
        fi
    
    - name: Upload Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trust-report
        path: ${{ inputs.output-file }}
