name: "Close stale issues and PRs"

on:
  schedule:
    - cron: "0 0 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 14
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this is still relevant, please comment or remove the `stale` label.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If you're still working on this, please push a commit or remove the `stale` label.
          exempt-issue-labels: "pinned,security,enhancement,good first issue"
          exempt-pr-labels: "pinned,security,work-in-progress"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
