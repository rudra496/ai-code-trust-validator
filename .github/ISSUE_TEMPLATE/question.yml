name: Question
description: Ask a question about the project
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: What would you like to know?
      description: Describe your question clearly so we can help you.
      placeholder: "How do I...?"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any relevant context (OS, Python version, what you've tried, etc.)
      placeholder: "I'm using Python 3.11 on macOS..."
  - type: checkboxes
    id: checklist
    attributes:
      label: Before asking
      options:
        - label: I searched existing issues and discussions
          required: true
        - label: I read the documentation (README, CONTRIBUTING.md)
          required: true
